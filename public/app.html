<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>tmuxremote</title>
  <link rel="stylesheet" href="/node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <button id="burgerBtn" class="btn-burger" title="Menu">☰</button>
      <span class="logo">🖥️ tmuxremote</span>
    </div>
    <div class="header-center">
      <div class="zoom-controls">
        <button id="zoomOutBtn" class="btn-zoom" title="Zoom out (Ctrl+-)">−</button>
        <span id="zoomLabel" class="zoom-label" title="Click to reset zoom">14px</span>
        <button id="zoomInBtn" class="btn-zoom" title="Zoom in (Ctrl+=)">+</button>
      </div>
    </div>
    <div class="header-right">
      <span id="userLabel" class="user-label"></span>
      <button id="logoutBtn" class="btn-icon" title="Logout">⏻</button>
    </div>
  </header>

  <!-- App Layout: sidebar + main -->
  <div id="appLayout" class="app-layout">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-panel="files" title="File Manager">📁</button>
        <button class="sidebar-tab" data-panel="git" title="Git">🔀</button>
      </div>
      <div class="sidebar-content">
        <!-- Files Panel -->
        <div id="filesPanel" class="sidebar-panel active">
          <div class="panel-header">
            <span>File Manager</span>
          </div>
          <div id="fileTree" class="file-tree"></div>
        </div>
        <!-- Git Panel -->
        <div id="gitPanel" class="sidebar-panel">
          <div class="panel-header">
            <span>Git</span>
          </div>
          <div id="gitGraphs" class="git-graphs"></div>
        </div>
      </div>
    </aside>

    <!-- Sidebar overlay for mobile -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Main content -->
    <main class="main-content">
      <!-- Tab Bar -->
      <div id="tabBar" class="tab-bar">
        <div id="tabs" class="tabs"></div>
        <button id="addTabBtn" class="btn-add-tab" title="New Tab">+</button>
      </div>

      <!-- Terminal Container -->
      <div id="terminalContainer" class="terminal-container"></div>
    </main>
  </div>

  <!-- Context Menu -->
  <div id="contextMenu" class="context-menu" style="display:none">
    <div class="context-menu-item" data-action="open-terminal">🖥️ Open terminal here</div>
    <div class="context-menu-item" data-action="add-favorite">⭐ Add to favorites</div>
    <div class="context-menu-item context-menu-danger" data-action="remove-favorite" style="display:none">✕ Remove from favorites</div>
  </div>

  <!-- Mobile Keyboard Overlay -->
  <div id="mobileKeyboard" class="mobile-keyboard">
    <div id="keyboardDragHandle" class="keyboard-drag-handle">
      <span class="drag-dots">⠿</span>
      <span class="keyboard-label">Dev Keys</span>
      <div class="keyboard-handle-actions">
        <button id="toggleKeyboard" class="btn-toggle" title="Expand/Collapse">▾</button>
        <button id="dismissKeyboard" class="btn-dismiss">✕</button>
      </div>
    </div>

    <!-- Compact row -->
    <div class="keyboard-compact" id="keyboardCompact">
      <div class="key-row">
        <button class="mod-key compact-key" data-action="ctrl-c">^C</button>
        <button class="mod-key compact-key" data-action="esc">Esc</button>
        <button class="mod-key compact-key" data-action="tab">Tab</button>
        <button class="mod-key compact-key" data-mod="ctrl">Ctrl</button>
        <button class="mod-key compact-key" data-mod="alt">Alt</button>
        <button class="mod-key compact-key" data-action="arrow-up">↑</button>
        <button class="mod-key compact-key" data-action="arrow-down">↓</button>
        <button class="mod-key compact-key" data-action="copy" title="Copy selection">📋</button>
        <button class="mod-key compact-key" data-action="paste" title="Paste">📄</button>
      </div>
    </div>

    <!-- Extended rows -->
    <div class="keyboard-rows" id="keyboardRows" style="display:none">
      <div class="key-row">
        <button class="mod-key" data-action="arrow-left">←</button>
        <button class="mod-key" data-action="arrow-right">→</button>
        <button class="mod-key" data-action="home">Home</button>
        <button class="mod-key" data-action="end">End</button>
        <button class="mod-key" data-action="pgup">PgUp</button>
        <button class="mod-key" data-action="pgdn">PgDn</button>
      </div>
      <div class="key-row">
        <button class="mod-key" data-mod="meta">⌘</button>
        <button class="mod-key" data-action="shift-tab">S-Tab</button>
        <button class="mod-key" data-action="ins">Ins</button>
        <button class="mod-key" data-action="del">Del</button>
        <button class="mod-key" data-action="backspace">BS</button>
      </div>
      <div class="key-row">
        <button class="mod-key fn-key" data-action="f1">F1</button>
        <button class="mod-key fn-key" data-action="f2">F2</button>
        <button class="mod-key fn-key" data-action="f3">F3</button>
        <button class="mod-key fn-key" data-action="f4">F4</button>
        <button class="mod-key fn-key" data-action="f5">F5</button>
        <button class="mod-key fn-key" data-action="f6">F6</button>
      </div>
      <div class="key-row">
        <button class="mod-key fn-key" data-action="f7">F7</button>
        <button class="mod-key fn-key" data-action="f8">F8</button>
        <button class="mod-key fn-key" data-action="f9">F9</button>
        <button class="mod-key fn-key" data-action="f10">F10</button>
        <button class="mod-key fn-key" data-action="f11">F11</button>
        <button class="mod-key fn-key" data-action="f12">F12</button>
      </div>
      <div class="key-row">
        <button class="mod-key" data-char="|">|</button>
        <button class="mod-key" data-char="~">~</button>
        <button class="mod-key" data-char="`">`</button>
        <button class="mod-key" data-char="\\">\\</button>
        <button class="mod-key" data-action="ctrl-d">^D</button>
        <button class="mod-key" data-action="ctrl-z">^Z</button>
        <button class="mod-key" data-action="ctrl-l">^L</button>
      </div>
    </div>
  </div>

  <!-- FAB to show keyboard when dismissed -->
  <button id="showKeyboardFab" class="show-keyboard-fab" style="display:none" title="Show dev keyboard">⌨</button>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
